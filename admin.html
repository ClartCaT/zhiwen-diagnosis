  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知问组织诊断 · 管理后台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #EFF6FF;
      --text: #1F2937; --text-secondary: #6B7280; --text-muted: #9CA3AF;
      --bg: #F9FAFB; --surface: #FFFFFF; --border: #E5E7EB; --border-light: #F3F4F6;
      --success: #10B981; --success-light: #D1FAE5; --warning: #F59E0B; --warning-light: #FEF3C7;
      --error: #EF4444; --info: #3B82F6; --info-light: #DBEAFE;
      --radius: 12px; --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; }

    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 12px; position: fixed; height: 100vh; }
    .sidebar-logo { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 28px; padding: 0 8px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); text-decoration: none; font-size: 13px; margin-bottom: 3px; }
    .sidebar-nav a:hover { background: var(--border-light); }
    .sidebar-nav a.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .sidebar-nav a i { width: 16px; text-align: center; }

    .main { margin-left: 220px; flex: 1; padding: 28px; }
    .page-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .page-header h1 { font-size: 22px; font-weight: 600; }

    .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); padding: 20px; margin-bottom: 16px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { padding: 16px; }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-value { font-size: 24px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
    tr:hover td { background: var(--border-light); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .badge-collecting { background: var(--info-light); color: var(--info); }
    .badge-done { background: var(--success-light); color: var(--success); }
    .badge-pending { background: var(--warning-light); color: var(--warning); }

    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: var(--font); transition: all .15s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { background: var(--border-light); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--error); color: white; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); width: 90%; max-width: 520px; max-height: 80vh; overflow-y: auto; padding: 28px; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
    .form-input, .form-select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font); outline: none; }
    .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .link-box { background: var(--border-light); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; word-break: break-all; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .link-box code { flex: 1; }
    .copy-btn { cursor: pointer; color: var(--primary); font-size: 14px; }
    .copy-btn:hover { color: var(--primary-dark); }

    .participant-list { margin-top: 16px; }
    .participant-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border-light); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .participant-item .info { display: flex; align-items: center; gap: 10px; }
    .participant-item .name { font-weight: 500; font-size: 13px; }
    .participant-item .email { font-size: 12px; color: var(--text-muted); }
    .participant-item .status { font-size: 11px; }

    /* Login overlay */
    .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; width: 90%; max-width: 360px; text-align: center; }
    .login-box h2 { font-size: 18px; color: var(--primary); margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .login-box .form-input { margin-bottom: 14px; }
    .login-box .btn { width: 100%; padding: 10px; }
    .login-error { color: var(--error); font-size: 12px; margin-bottom: 10px; display: none; }

    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2><i class="fa-solid fa-lock"></i> 管理后台</h2>
    <p>知问组织诊断工具</p>
    <div class="login-error" id="login-error">密码错误</div>
    <input type="password" class="form-input" id="login-pwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-stethoscope"></i> 知问诊断</div>
    <nav class="sidebar-nav" id="nav">
      <a href="#" data-sec="dashboard" class="active"><i class="fa-solid fa-house"></i>仪表盘</a>
      <a href="#" data-sec="projects"><i class="fa-solid fa-folder-open"></i>诊断项目</a>
      <a href="#" data-sec="settings"><i class="fa-solid fa-gear"></i>设置</a>
    </nav>
  </aside>

  <main class="main">
    <!-- Dashboard -->
    <section id="sec-dashboard">
      <div class="page-header"><h1>仪表盘</h1><button class="btn btn-primary" onclick="openModal('modal-new-project')"><i class="fa-solid fa-plus"></i>新建项目</button></div>
      <div class="stats-grid">
        <div class="card stat-card"><div class="stat-label">进行中</div><div class="stat-value" id="s-active">0</div></div>
        <div class="card stat-card"><div class="stat-label">已完成</div><div class="stat-value" id="s-done">0</div></div>
        <div class="card stat-card"><div class="stat-label">总项目数</div><div class="stat-value" id="s-total">0</div></div>
      </div>
      <div class="card">
        <h3 style="font-size:15px; margin-bottom:12px;">最近项目</h3>
        <table><thead><tr><th>公司</th><th>行业</th><th>状态</th><th>进度</th><th>操作</th></tr></thead>
        <tbody id="tb-projects"><tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px;">暂无项目</td></tr></tbody></table>
      </div>
    </section>

    <!-- Projects (same as dashboard table for now) -->
    <section id="sec-projects" style="display:none;">
      <div class="page-header"><h1>诊断项目</h1><button class="btn btn-primary" onclick="openModal('modal-new-project')"><i class="fa-solid fa-plus"></i>新建项目</button></div>
      <div class="card"><table><thead><tr><th>公司</th><th>行业</th><th>规模</th><th>状态</th><th>进度</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="tb-projects2"></tbody></table></div>
    </section>

    <!-- Settings -->
    <section id="sec-settings" style="display:none;">
      <div class="page-header"><h1>设置</h1></div>
      <div class="card"><p style="color:var(--text-muted);font-size:13px;">基础设置功能开发中</p></div>
    </section>

    <!-- Project Detail (shown dynamically) -->
    <section id="sec-detail" style="display:none;">
      <div class="page-header">
        <div><button class="btn btn-outline btn-sm" onclick="backToList()" style="margin-bottom:8px;"><i class="fa-solid fa-arrow-left"></i> 返回</button><h1 id="detail-title"></h1></div>
        <button class="btn btn-primary" onclick="openModal('modal-add-participant')"><i class="fa-solid fa-user-plus"></i>添加参与者</button>
      </div>
      <div class="card">
        <h3 style="font-size:14px; margin-bottom:12px;">参与者列表</h3>
        <div id="participant-list" class="participant-list"></div>
      </div>
    </section>
  </main>
</div>

<!-- Modal: New Project -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal">
    <h2>新建诊断项目</h2>
    <div class="form-group"><label class="form-label">客户公司名称 *</label><input class="form-input" id="np-company" placeholder="例：某某科技有限公司"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">行业</label><select class="form-select" id="np-industry"><option value="">请选择</option><option>科技/互联网</option><option>半导体/芯片</option><option>人工智能</option><option>新能源</option><option>智能制造</option><option>生物医药</option><option>其他</option></select></div>
      <div class="form-group"><label class="form-label">团队规模</label><select class="form-select" id="np-size"><option value="">请选择</option><option>1-10人</option><option>10-30人</option><option>30-50人</option><option>50-100人</option><option>100人以上</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">融资阶段</label><select class="form-select" id="np-stage"><option value="">请选择</option><option>未融资</option><option>天使轮</option><option>A轮</option><option>B轮</option><option>C轮及以后</option></select></div>
      <div class="form-group"><label class="form-label">联系人邮箱</label><input class="form-input" id="np-email" placeholder="选填"></div>
    </div>
    <div class="form-group"><label class="form-label">联系人姓名</label><input class="form-input" id="np-contact" placeholder="选填"></div>
    <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal('modal-new-project')">取消</button>
      <button class="btn btn-primary" onclick="createProject()">创建项目</button>
    </div>
  </div>
</div>

<!-- Modal: Add Participant -->
<div class="modal-overlay" id="modal-add-participant">
  <div class="modal">
    <h2>添加参与者</h2>
    <div class="form-group"><label class="form-label">角色 *</label>
      <select class="form-select" id="ap-role"><option value="founder">创始人</option><option value="manager">管理者</option><option value="employee">员工</option></select>
    </div>
    <div class="form-group"><label class="form-label">姓名</label><input class="form-input" id="ap-name" placeholder="员工可留空（匿名）"></div>
    <div class="form-group"><label class="form-label">邮箱 *</label><input class="form-input" id="ap-email" placeholder="用于发送专属链接" type="email"></div>
    <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeModal('modal-add-participant')">取消</button>
      <button class="btn btn-primary" onclick="addParticipant()">添加</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://phnccyoxgwoekbiuznze.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBobmNjeW94Z3dvZWtiaXV6bnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTQwNTAsImV4cCI6MjA5OTA3MDA1MH0.uEpxtmAEpKQV9s78fCLREczK2vluAa6Gp3eKe6ZJ4OA'; // 替换为真实 key
const ADMIN_PWD = 'zhiwen2026'; // 管理员密码
const SITE_URL = 'https://www.zhiwen-hr.cn'; // 你的网站域名

let currentProjectId = null;

// ============================================================
// AUTH
// ============================================================
function doLogin() {
  const pwd = document.getElementById('login-pwd').value.trim();
  if (pwd === ADMIN_PWD) {
    document.getElementById('login-overlay').style.display = 'none';
    sessionStorage.setItem('zw_admin', '1');
    loadProjects();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function checkAuth() {
  if (sessionStorage.getItem('zw_admin') === '1') {
    document.getElementById('login-overlay').style.display = 'none';
    loadProjects();
  }
}

// ============================================================
// NAVIGATION
// ============================================================
document.getElementById('nav').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  document.querySelectorAll('#nav a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  document.querySelectorAll('.main > section').forEach(s => s.style.display = 'none');
  document.getElementById('sec-' + a.dataset.sec).style.display = '';
});

function backToList() {
  document.getElementById('sec-detail').style.display = 'none';
  document.getElementById('sec-dashboard').style.display = '';
}

// ============================================================
// PROJECTS
// ============================================================
async function loadProjects() {
  if (!SUPABASE_KEY || SUPABASE_KEY.includes('YOUR_')) return;
  try {
    const res = await api('projects?order=created_at.desc');
    if (!res.ok) return;
    const projects = await res.json();
    if (!Array.isArray(projects)) return;

    // Get participant counts
    for (const p of projects) {
      const pRes = await api('participants?project_id=eq.' + p.id + '&select=id,has_submitted');
      if (pRes.ok) { const parts = await pRes.json(); p._total = parts.length; p._done = parts.filter(x=>x.has_submitted).length; }
      else { p._total = 0; p._done = 0; }
    }

    // Stats
    document.getElementById('s-total').textContent = projects.length;
    document.getElementById('s-active').textContent = projects.filter(p => p.status === 'collecting').length;
    document.getElementById('s-done').textContent = projects.filter(p => ['report_generated','report_sent'].includes(p.status)).length;

    // Render
    const html = projects.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:30px;">暂无项目</td></tr>'
      : projects.map(p => `<tr>
        <td><strong>${p.company_name}</strong></td>
        <td>${p.industry||'-'}</td>
        <td><span class="badge badge-collecting">收集中</span></td>
        <td>${p._done}/${p._total}</td>
        <td><button class="btn btn-outline btn-sm" onclick="viewProject('${p.id}','${p.company_name}')">管理</button></td>
      </tr>`).join('');
    document.getElementById('tb-projects').innerHTML = html;
    document.getElementById('tb-projects2').innerHTML = projects.map(p => `<tr>
      <td><strong>${p.company_name}</strong></td><td>${p.industry||'-'}</td><td>${p.company_size||'-'}</td>
      <td><span class="badge badge-collecting">收集中</span></td><td>${p._done}/${p._total}</td>
      <td>${new Date(p.created_at).toLocaleDateString('zh-CN')}</td>
      <td><button class="btn btn-outline btn-sm" onclick="viewProject('${p.id}','${p.company_name}')">管理</button></td>
    </tr>`).join('');
  } catch(e) { console.error(e); }
}

async function createProject() {
  const company = document.getElementById('np-company').value.trim();
  if (!company) { alert('请输入公司名称'); return; }
  const body = {
    company_name: company,
    industry: document.getElementById('np-industry').value,
    company_size: document.getElementById('np-size').value,
    stage: document.getElementById('np-stage').value,
    contact_name: document.getElementById('np-contact').value,
    contact_email: document.getElementById('np-email').value,
    status: 'collecting'
  };
  const res = await api('projects', 'POST', body, 'return=representation');
  if (!res.ok) { alert('创建失败: ' + res.status); return; }
  closeModal('modal-new-project');
  // Clear form
  ['np-company','np-contact','np-email'].forEach(id => document.getElementById(id).value = '');
  ['np-industry','np-size','np-stage'].forEach(id => document.getElementById(id).selectedIndex = 0);
  loadProjects();
  alert('项目创建成功！请进入项目添加参与者。');
}

// ============================================================
// PROJECT DETAIL & PARTICIPANTS
// ============================================================
async function viewProject(id, name) {
  currentProjectId = id;
  document.querySelectorAll('.main > section').forEach(s => s.style.display = 'none');
  document.getElementById('sec-detail').style.display = '';
  document.getElementById('detail-title').textContent = name;
  await loadParticipants();
}

async function loadParticipants() {
  const res = await api('participants?project_id=eq.' + currentProjectId + '&order=created_at');
  if (!res.ok) return;
  const parts = await res.json();
  const roleNames = { founder: '创始人', manager: '管理者', employee: '员工' };
  const roleColors = { founder: '#7C3AED', manager: '#2563EB', employee: '#6B7280' };

  if (parts.length === 0) {
    document.getElementById('participant-list').innerHTML = '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">还没有参与者，点击右上角"添加参与者"开始</p>';
    return;
  }

  document.getElementById('participant-list').innerHTML = parts.map(p => {
    const link = `${SITE_URL}/?t=${p.invite_code}`;
    const status = p.has_submitted
      ? '<span style="color:var(--success)"><i class="fa-solid fa-circle-check"></i> 已提交</span>'
      : '<span style="color:var(--warning)"><i class="fa-solid fa-clock"></i> 待填写</span>';
    return `<div class="participant-item">
      <div class="info">
        <span class="badge" style="background:${roleColors[p.role]}22;color:${roleColors[p.role]}">${roleNames[p.role]}</span>
        <span class="name">${p.name || '匿名'}</span>
        <span class="email">${p.email || ''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="status">${status}</span>
        <div class="link-box"><code>${link}</code><i class="fa-solid fa-copy copy-btn" onclick="copyLink('${link}')"></i></div>
      </div>
    </div>`;
  }).join('');
}

async function addParticipant() {
  const role = document.getElementById('ap-role').value;
  const name = document.getElementById('ap-name').value.trim();
  const email = document.getElementById('ap-email').value.trim();
  if (!email) { alert('请输入邮箱'); return; }

  // Generate unique token
  const token = generateToken();
  const body = { project_id: currentProjectId, role, name, email, invite_code: token };
  const res = await api('participants', 'POST', body);
  if (!res.ok) { alert('添加失败: ' + res.status); return; }

  closeModal('modal-add-participant');
  document.getElementById('ap-name').value = '';
  document.getElementById('ap-email').value = '';
  await loadParticipants();

  // Show the link for easy copying
  const link = `${SITE_URL}/?t=${token}`;
  alert(`添加成功！\n\n专属链接：\n${link}\n\n请将此链接发送给 ${name || email}`);
}

// ============================================================
// HELPERS
// ============================================================
function generateToken() {
  const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
  let t = '';
  for (let i = 0; i < 16; i++) t += chars[Math.floor(Math.random() * chars.length)];
  return t;
}

function copyLink(link) {
  navigator.clipboard.writeText(link).then(() => {
    // Brief visual feedback
    event.target.classList.replace('fa-copy', 'fa-check');
    setTimeout(() => event.target.classList.replace('fa-check', 'fa-copy'), 1500);
  });
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function api(path, method, body, prefer) {
  const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
  if (prefer) headers['Prefer'] = prefer;
  const opts = { method: method || 'GET', headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
}

// Init
document.addEventListener('DOMContentLoaded', checkAuth);
</script>


</body></html>
